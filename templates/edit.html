{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2>Editar Custo</h2>
    <p class="subtitle">Altere as informações do lançamento</p>
</div>

<div class="launch-container">
    <form action="{{ url_for('edit_cost', cost_id=cost.id) }}" method="POST" class="cost-form">
        <div class="form-grid">
            <div class="form-group">
                <label for="value">Valor (R$)</label>
                <div class="input-icon">
                    <span class="material-icons-round">attach_money</span>
                    <input type="text" id="value" name="value"
                           value="{{ "%.2f"|format(cost.value)|replace('.', ',') }}"
                           required inputmode="decimal">
                </div>
            </div>

            <div class="form-group">
                <label for="comment">Comentário</label>
                <div class="input-icon">
                    <span class="material-icons-round">edit_note</span>
                    <input type="text" id="comment" name="comment"
                           value="{{ cost.comment or '' }}"
                           placeholder="Descreva o gasto (opcional)">
                </div>
            </div>

            <div class="form-group">
                <label for="category_id">Categoria</label>
                <div class="input-icon">
                    <span class="material-icons-round">category</span>
                    <select id="category_id" name="category_id" required>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {{ 'selected' if cat.id == cost.category_id }}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <span class="material-icons-round">arrow_back</span>
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                <span class="material-icons-round">save</span>
                Salvar Alterações
            </button>
        </div>
    </form>
</div>
{% endblock %}
