<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill - Controle de Custos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="material-icons-round">account_balance_wallet</span>
            <h1>Bill</h1>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">
                    <span class="material-icons-round">add_card</span>
                    <span class="nav-label">Lançar</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
                    <span class="material-icons-round">dashboard</span>
                    <span class="nav-label">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('manage_categories') }}" class="{{ 'active' if request.endpoint == 'manage_categories' }}">
                    <span class="material-icons-round">category</span>
                    <span class="nav-label">Categorias</span>
                </a>
            </li>
        </ul>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
