<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<section layout:fragment="content">
    <div class="page-header">
        <h2>Gerenciar Categorias</h2>
        <p class="subtitle">Adicione ou remova categorias de custo</p>
    </div>

    <div class="launch-container">
        <form th:action="@{/categories/add}" method="POST" class="cost-form">
            <div class="form-grid form-grid-3">
                <div class="form-group">
                    <label for="name">Nome da Categoria</label>
                    <div class="input-icon">
                        <span class="material-icons-round">label</span>
                        <input type="text" id="name" name="name" placeholder="Ex: Alimentação" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="color">Cor</label>
                    <div class="input-icon color-input-wrapper">
                        <input type="color" id="color" name="color" value="#6366f1" class="color-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="icon">Ícone</label>
                    <div class="input-icon">
                        <span class="material-icons-round">interests</span>
                        <select id="icon" name="icon">
                            <option value="receipt_long">Recibo</option>
                            <option value="smartphone">Celular</option>
                            <option value="home">Casa</option>
                            <option value="shopping_cart">Compras</option>
                            <option value="person">Pessoa</option>
                            <option value="favorite">Coração</option>
                            <option value="add_circle">Adicionar</option>
                            <option value="autorenew">Recorrente</option>
                            <option value="health_and_safety">Saúde</option>
                            <option value="child_care">Criança</option>
                            <option value="local_taxi">Táxi</option>
                            <option value="restaurant">Restaurante</option>
                            <option value="school">Educação</option>
                            <option value="fitness_center">Academia</option>
                            <option value="pets">Pets</option>
                            <option value="flight">Viagem</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-submit">
                <span class="material-icons-round">add</span>
                Adicionar Categoria
            </button>
        </form>
    </div>

    <div class="categories-list">
        <div th:each="cat : ${categories}" class="category-list-item" th:style="'--cat-color: ' + ${cat.color()}">
            <div class="cat-info">
                <span class="material-icons-round" th:style="'color: ' + ${cat.color()}" th:text="${cat.icon()}">icon</span>
                <span class="cat-list-name" th:text="${cat.name()}">Nome</span>
                <span class="cat-cost-count" th:text="${cat.costCountLabel()}">0 lançamento(s)</span>
            </div>
            <form th:action="@{/categories/{id}/delete(id=${cat.id()})}" method="POST"
                  onsubmit="return confirm('Isso apagará todos os custos desta categoria. Continuar?')">
                <button type="submit" class="btn-icon btn-icon-danger" title="Excluir categoria">
                    <span class="material-icons-round">delete</span>
                </button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
