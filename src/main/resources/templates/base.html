<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill - Controle de Custos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="material-icons-round">account_balance_wallet</span>
            <h1>Bill</h1>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a th:href="@{/}" th:classappend="${activePage == 'index' ? 'active' : ''}">
                    <span class="material-icons-round">add_card</span>
                    <span class="nav-label">Lançar</span>
                </a>
            </li>
            <li>
                <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                    <span class="material-icons-round">dashboard</span>
                    <span class="nav-label">Dashboard</span>
                </a>
            </li>
            <li>
                <a th:href="@{/incomes}" th:classappend="${activePage == 'incomes' ? 'active' : ''}">
                    <span class="material-icons-round">savings</span>
                    <span class="nav-label">Entradas</span>
                </a>
            </li>
            <li>
                <a th:href="@{/charts}" th:classappend="${activePage == 'charts' ? 'active' : ''}">
                    <span class="material-icons-round">bar_chart</span>
                    <span class="nav-label">Gráficos</span>
                </a>
            </li>
            <li>
                <a th:href="@{/categories/manage}" th:classappend="${activePage == 'categories' ? 'active' : ''}">
                    <span class="material-icons-round">category</span>
                    <span class="nav-label">Categorias</span>
                </a>
            </li>
        </ul>
        <form th:action="@{/logout}" method="POST" class="sidebar-logout">
            <button type="submit" class="sidebar-logout-btn">
                <span class="material-icons-round">logout</span>
                <span class="nav-label">Sair</span>
            </button>
        </form>
    </nav>

    <main class="content">
        <section layout:fragment="content"></section>
    </main>

    <script th:src="@{/js/app.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
