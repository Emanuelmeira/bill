<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<body>
<section layout:fragment="content">
    <div class="page-header">
        <h2>Editar Custo</h2>
        <p class="subtitle">Altere as informações do lançamento</p>
    </div>

    <div class="launch-container">
        <form th:action="@{/costs/{id}/edit(id=${cost.id})}" method="POST" class="cost-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="value">Valor (R$)</label>
                    <div class="input-icon">
                        <span class="material-icons-round">attach_money</span>
                        <input type="text" id="value" name="value"
                               th:value="${costValueFormatted}"
                               required inputmode="decimal">
                    </div>
                </div>

                <div class="form-group">
                    <label for="refMonth">Mês de Referência</label>
                    <div class="input-icon">
                        <span class="material-icons-round">calendar_month</span>
                        <input type="month" id="refMonth" name="refMonth"
                               th:value="${refMonthValue}">
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="categoryId">Categoria</label>
                    <div class="input-icon">
                        <span class="material-icons-round">category</span>
                        <select id="categoryId" name="categoryId" required>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:selected="${cat.id == cost.categoryId}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment">Comentário</label>
                    <div class="input-icon">
                        <span class="material-icons-round">edit_note</span>
                        <input type="text" id="comment" name="comment"
                               th:value="${cost.comment}"
                               placeholder="Descreva o gasto (opcional)">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/dashboard(month=${cost.month}, year=${cost.year})}" class="btn btn-secondary">
                    <span class="material-icons-round">arrow_back</span>
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <span class="material-icons-round">save</span>
                    Salvar
                </button>
            </div>
        </form>
    </div>
</section>
</body>
</html>
